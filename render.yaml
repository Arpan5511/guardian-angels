services:
  - type: web
    name: guardian-angels
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    startCommand: gunicorn guardian_angels.wsgi
    envVars:
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
databases:
  - name: postgres
    plan: free
